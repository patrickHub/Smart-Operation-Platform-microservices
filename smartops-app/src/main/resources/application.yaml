spring:
  application:
    name: smartops-app
  datasource:
    url: jdbc:postgresql://localhost:5432/smartops
    username: smartops
    password: smartops
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      client-id: smartops-platform
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: smartops-notification
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  flyway:
    enabled: true
    locations: classpath:db/migration
smartops:
  outbox:
    enabled: true
    polling-rate-ms: 600000
    max-attempts: 5
  kafka:
    topics:
      workorder-events: smartops.workorder.events
      billing-events: smartops.billing.events
    consumer:
      notification-group: smartops-notification
server:
  port: 8080

logging:
  level:
    root: INFO
    org.hibernate.SQL: warn
