spring:
  application:
    name: smartops-app
  datasource:
    url: jdbc:postgresql://localhost:5432/smartops
    username: smartops
    password: smartops
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080
